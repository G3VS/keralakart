{% extends 'base.html' %}
{% block title %}Login — KeralaKart{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width:440px">
  <div class="text-center mb-4">
    <div style="font-size:2.5rem">🌿</div>
    <h2 class="section-heading">Welcome <span>Back</span></h2>
    <p class="text-muted">Sign in to your KeralaKart account</p>
  </div>
  <div class="bg-white rounded-3 p-4" style="border:1px solid rgba(0,0,0,0.07)">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus placeholder="Your username">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Your password">
`
      <button type="submit" class="btn btn-kerala w-100 btn-lg">Sign In</button>
    </form>
    <p class="text-center mt-3 mb-0" style="font-size:0.9rem">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--green);font-weight:500">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
